<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colorful Hand Tracking</title>
  <link rel="stylesheet" href="./src/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Hidden webcam video element -->
  <video id="webcam" autoplay playsinline style="display: none;"></video>

  <!-- UI Overlay -->
  <div id="ui">
    <h1>Hand Tracking Experiences</h1>
    <p id="status-text">Loading...</p>

    <div id="mode-selector" style="display: none;">
      <button data-mode="particles" class="active">Glowing Particles</button>
      <button data-mode="draw">Neon Air Drawing</button>
      <button data-mode="strings">Elastic Strings</button>
    </div>

    <div class="instructions">
      <h2>Instructions</h2>
      <p id="mode-instructions">Bring your hands into view.</p>
    </div>
  </div>

  <!-- Main Entry Point -->
  <script type="module" src="./src/main.js"></script>
</body>

</html>
